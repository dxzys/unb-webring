<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="description" content="A webring for students and alumni at the University of New Brunswick." />
        <meta property="og:type" content="website" />
        <meta property="og:title" content="UNB Webring" />
        <meta property="og:description" content="A webring for students and alumni at the University of New Brunswick." />
        <meta property="og:url" content="https://unb-webring.netlify.app" />
        <meta property="og:image" content="/favicon.svg" />
        <meta property="og:image:secure_url" content="/favicon.svg" />
        <title>UNB Webring</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" />
        <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
        <link rel="stylesheet" href="unb-webring.css" />
    </head>
    <body>
        <main class="landing">
            <div class="centerpiece">
                <canvas id="scene-canvas" aria-hidden="true"></canvas>
                <p class="tagline">A webring for students and alumni at the University of New Brunswick.</p>
                <div class="site-section">
                    <input id="site-search" class="site-search" type="text" placeholder="search by name / year / url" autocomplete="off" spellcheck="false"/>
                    <div class="site-columns" aria-hidden="true">
                        <span>name</span>
                        <span>campus</span>
                        <span>year</span>
                        <span>url</span>
                    </div>
                    <ul id="site-list" class="site-list"></ul>
                </div>
            </div>
        </main>
        <div id="footer-container">
                <p id="footer-link">
                    <a class="add-site-link" href="https://github.com/dxzys/unb-webring" target="_blank" rel="noreferrer">add your site</a>
                </p>
        </div>
    <script type="module" src="javascript/unb-webring.js"></script>
    </body>
</html>
